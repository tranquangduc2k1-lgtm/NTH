<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tìm mã PDF</title>

<style>
body {
  font-family: Arial;
  max-width: 900px;
  margin: auto;
  background: #f5f5f5;
}

h2 {
  text-align: center;
}

input {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  margin-top: 10px;
}

#status {
  margin-top: 10px;
  font-weight: bold;
}

iframe {
  margin-top: 15px;
  border: 1px solid #ccc;
}
</style>
</head>

<body>

<h2>🔎 Tìm mã sản phẩm</h2>

<input type="text" id="searchBox" placeholder="Quét hoặc nhập mã...">

<div id="status"></div>
<div id="result"></div>

<script>
let data = [];

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT-ihe2BoE3uU_trCfMHs-4vdTx9UnW_bnHz80vi4__AA_p-xW98E1oBDcOlan7XDFFn0w0WwSsaRhJ/pub?output=csv";

// 🔥 LOAD JSON LOCAL
fetch("data.json")
  .then(res => res.json())
  .then(json => {
    data = json;
    console.log("DATA LOADED:", data);
  });
// 🔍 xử lý khi nhập hoặc scan
const input = document.getElementById("searchBox");

input.addEventListener("input", handleSearch);
input.addEventListener("keypress", function(e) {
  if (e.key === "Enter") handleSearch();
});

function handleSearch() {
  const keyword = input.value.trim().toLowerCase();

  if (!keyword) {
    document.getElementById("result").innerHTML = "";
    document.getElementById("status").innerHTML = "";
    return;
  }

  const found = data.find(item => item.code === keyword);

  if (found) {
    document.getElementById("status").innerHTML = "✅ Tìm thấy";

    document.getElementById("result").innerHTML = `
      <iframe 
        src="https://docs.google.com/gview?url=${found.url}&embedded=true"
        width="100%" 
        height="600px">
      </iframe>
    `;

    // 🔥 tự clear sau khi scan (tuỳ chọn)
    // input.value = "";

  } else {
    document.getElementById("status").innerHTML = "❌ Không tìm thấy";
    document.getElementById("result").innerHTML = "";
  }
}
</script>

</body>
</html>
