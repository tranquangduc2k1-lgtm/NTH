<script>
let data = [];

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT-ihe2BoE3uU_trCfMHs-4vdTx9UnW_bnHz80vi4__AA_p-xW98E1oBDcOlan7XDFFn0w0WwSsaRhJ/pub?output=csv";

// load dữ liệu
fetch(sheetURL)
  .then(res => res.text())
  .then(csv => {
    const rows = csv.split("\n").slice(1);

    data = rows.map(row => {
      const cols = row.split(",");
      return {
        code: cols[0]?.replace(/"/g, "").trim().toLowerCase(),
        url: cols[1]?.replace(/"/g, "").trim()
      };
    });
  });

const input = document.getElementById("searchBox");

// 🔥 CHỈ dùng Enter (chuẩn cho scan)
input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault(); // tránh reload form
    handleSearch(true); // true = scan
  }
});

function handleSearch(isScan = false) {
  const keyword = input.value.trim().toLowerCase();

  if (!keyword) {
    document.getElementById("result").innerHTML = "";
    document.getElementById("status").innerHTML = "";
    return;
  }

  const found = data.find(item => item.code === keyword);

  if (found) {
    document.getElementById("status").innerHTML = "✅ Tìm thấy";

    document.getElementById("result").innerHTML = `
      <iframe 
        src="https://docs.google.com/gview?url=${found.url}&embedded=true"
        width="100%" 
        height="600px">
      </iframe>
    `;
  } else {
    document.getElementById("status").innerHTML = "❌ Không tìm thấy";
    document.getElementById("result").innerHTML = "";
  }

  // 🔥 CHỈ auto select nếu là scan (Enter)
  if (isScan) {
    input.focus();
    input.select();
  }
}

// focus khi mở trang
window.onload = () => {
  input.focus();
};
</script>
