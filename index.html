<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tìm mã PDF</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body {
  font-family: Arial;
  max-width: 900px;
  margin: auto;
  background: #f5f5f5;
}

input {
  width: 100%;
  padding: 14px;
  font-size: 18px;
}

#controls {
  margin-top: 10px;
}

button {
  padding: 8px 12px;
  margin-right: 5px;
}

canvas {
  margin-top: 10px;
  border: 1px solid #ccc;
}
</style>
</head>

<body>

<h2>🔎 Tìm mã sản phẩm</h2>

<input type="text" id="searchBox" placeholder="Quét hoặc nhập mã...">

<div id="status"></div>

<div id="controls" style="display:none;">
  <button onclick="zoomOut()">➖ Zoom Out</button>
  <button onclick="zoomIn()">➕ Zoom In</button>
</div>

<div id="pdfContainer"></div>

<script>
let data = [];
let pdfDoc = null;
let scale = 1.2;

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT-ihe2BoE3uU_trCfMHs-4vdTx9UnW_bnHz80vi4__AA_p-xW98E1oBDcOlan7XDFFn0w0WwSsaRhJ/pub?output=csv";

// load data
fetch(sheetURL)
  .then(res => res.text())
  .then(csv => {
    const rows = csv.split("\n").slice(1);

    data = rows.map(row => {
      const cols = row.split(",");
      return {
        code: cols[0]?.replace(/"/g, "").trim().toLowerCase(),
        url: cols[1]?.replace(/"/g, "").trim()
      };
    });
  });

// search
const input = document.getElementById("searchBox");

input.addEventListener("keypress", function(e) {
  if (e.key === "Enter") search();
});

function search() {
  const keyword = input.value.trim().toLowerCase();

  const found = data.find(item => item.code === keyword);

  if (found) {
    document.getElementById("status").innerHTML = "✅ Tìm thấy";
    loadPDF(found.url);
  } else {
    document.getElementById("status").innerHTML = "❌ Không tìm thấy";
  }
}

// load PDF
async function loadPDF(url) {
  const container = document.getElementById("pdfContainer");
  container.innerHTML = "⏳ Đang load PDF...";

  pdfDoc = await pdfjsLib.getDocument(url).promise;

  document.getElementById("controls").style.display = "block";

  renderAllPages();
}

// render tất cả trang
async function renderAllPages() {
  const container = document.getElementById("pdfContainer");
  container.innerHTML = "";

  for (let i = 1; i <= pdfDoc.numPages; i++) {
    const page = await pdfDoc.getPage(i);

    const viewport = page.getViewport({ scale: scale });

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.height = viewport.height;
    canvas.width = viewport.width;

    container.appendChild(canvas);

    await page.render({
      canvasContext: ctx,
      viewport: viewport
    }).promise;
  }
}

// zoom
function zoomIn() {
  scale += 0.2;
  renderAllPages();
}

function zoomOut() {
  scale -= 0.2;
  renderAllPages();
}
</script>

</body>
</html>
