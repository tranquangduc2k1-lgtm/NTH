<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tìm mã PDF</title>

<style>
body {
  font-family: Arial;
  max-width: 900px;
  margin: auto;
  background: #f5f5f5;
}

h2 {
  text-align: center;
}

.search-box {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 12px;
  font-size: 16px;
}

.result {
  background: white;
  margin-top: 10px;
  padding: 10px;
  cursor: pointer;
  border-radius: 6px;
}

.result:hover {
  background: #eaeaea;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
}

.modal-content {
  position: relative;
  width: 90%;
  height: 90%;
  margin: 2% auto;
  background: white;
}

.close {
  position: absolute;
  right: 10px;
  top: 5px;
  font-size: 24px;
  cursor: pointer;
}
</style>

</head>

<body>

<h2>🔎 Tìm mã sản phẩm</h2>

<div class="search-box">
  <input type="text" id="searchBox" placeholder="Nhập mã (MSP01...)">
</div>

<div id="results"></div>

<!-- MODAL -->
<div id="pdfModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <iframe id="pdfFrame" width="100%" height="100%"></iframe>
  </div>
</div>

<script>
let data = [];

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT-ihe2BoE3uU_trCfMHs-4vdTx9UnW_bnHz80vi4__AA_p-xW98E1oBDcOlan7XDFFn0w0WwSsaRhJ/pub?output=csv";

// load data
fetch(sheetURL)
  .then(res => res.text())
  .then(csv => {
    const rows = csv.split("\n").slice(1);

    data = rows.map(row => {
      const cols = row.split(",");
      return {
        code: cols[0]?.replace(/"/g, "").trim(),
        url: cols[1]?.replace(/"/g, "").trim()
      };
    });
  });

// search realtime
document.getElementById("searchBox").addEventListener("input", function() {
  const keyword = this.value.toLowerCase();

  const filtered = data.filter(item =>
    item.code && item.code.toLowerCase().includes(keyword)
  );

  let html = "";

  filtered.forEach(item => {
    html += `
      <div class="result" onclick="openPDF('${item.url}')">
        📄 ${item.code}
      </div>
    `;
  });

  document.getElementById("results").innerHTML = html || "❌ Không tìm thấy";
});

// mở modal
function openPDF(url) {
  document.getElementById("pdfModal").style.display = "block";

  document.getElementById("pdfFrame").src =
    "https://docs.google.com/gview?url=" + url + "&embedded=true";
}

// đóng modal
function closeModal() {
  document.getElementById("pdfModal").style.display = "none";
  document.getElementById("pdfFrame").src = "";
}
</script>

</body>
</html>
