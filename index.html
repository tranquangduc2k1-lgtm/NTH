<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tìm mã PDF</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body {
  font-family: Arial;
  max-width: 900px;
  margin: auto;
}

input {
  padding: 10px;
  width: 70%;
}

canvas {
  border: 1px solid #ccc;
  margin-top: 10px;
}
</style>
</head>

<body>

<h2>🔎 Tìm mã sản phẩm</h2>

<input type="text" id="searchBox" placeholder="Nhập mã">
<button onclick="search()">Tìm</button>

<div id="pdfContainer"></div>

<script>
let data = [];

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT-ihe2BoE3uU_trCfMHs-4vdTx9UnW_bnHz80vi4__AA_p-xW98E1oBDcOlan7XDFFn0w0WwSsaRhJ/pub?output=csv";

// load data
fetch(sheetURL)
  .then(res => res.text())
  .then(csv => {
    const rows = csv.split("\n").slice(1);
    data = rows.map(row => {
      const cols = row.split(",");
      return {
        code: cols[0]?.replace(/"/g, "").trim(),
        url: cols[1]?.replace(/"/g, "").trim()
      };
    });
  });

async function renderPDF(url) {
  const container = document.getElementById("pdfContainer");
  container.innerHTML = "Đang load PDF...";

  const pdf = await pdfjsLib.getDocument(url).promise;

  container.innerHTML = "";

  for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
    const page = await pdf.getPage(pageNum);

    const viewport = page.getViewport({ scale: 1.2 });

    const canvas = document.createElement("canvas");
    const context = canvas.getContext("2d");

    canvas.height = viewport.height;
    canvas.width = viewport.width;

    container.appendChild(canvas);

    await page.render({
      canvasContext: context,
      viewport: viewport
    }).promise;
  }
}

function search() {
  const keyword = document.getElementById("searchBox").value.toLowerCase();

  const found = data.find(item =>
    item.code && item.code.toLowerCase().includes(keyword)
  );

  if (found) {
    renderPDF(found.url);
  } else {
    document.getElementById("pdfContainer").innerHTML = "❌ Không tìm thấy";
  }
}
</script>

</body>
</html>
