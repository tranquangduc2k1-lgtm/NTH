<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tìm mô tả sản phẩm NTH</title>

<style>
body {
  font-family: Arial;
  max-width: 900px;
  margin: auto;
  background: #f5f5f5;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 20px;
}

.logo {
  width: 70px;
  high: 20px;
}

h2 {
  margin: 0;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  margin-top: 15px;
}

/* STATUS */
#status {
  margin-top: 10px;
  font-weight: bold;
}

/* PDF */
iframe {
  margin-top: 20px;
  border: 1px solid #ccc;
}
</style>
</head>

<body>

<!-- 🔥 HEADER CÓ LOGO -->
<div class="header">
  <img src="logo.png" class="logo">
  <h2> Tìm mô tả sản phẩm</h2>
</div>

<input type="text" id="searchBox" placeholder="Quét hoặc nhập mã...">

<div id="status"></div>
<div id="result"></div>

<script>
let data = [];

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT-ihe2BoE3uU_trCfMHs-4vdTx9UnW_bnHz80vi4__AA_p-xW98E1oBDcOlan7XDFFn0w0WwSsaRhJ/pub?output=csv";

// load dữ liệu
fetch(sheetURL)
  .then(res => res.text())
  .then(csv => {
    const rows = csv.split("\n").slice(1);

    data = rows.map(row => {
      const cols = row.split(",");
      return {
        code: cols[0]?.replace(/"/g, "").trim().toLowerCase(),
        url: cols[1]?.replace(/"/g, "").trim()
      };
    });
  });

const input = document.getElementById("searchBox");

// 🔥 CHỈ dùng Enter (scan + gõ tay)
input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    handleSearch(true);
  }
});
function convertDriveLink(url) {
  if (url.includes("drive.google.com")) {
    const match = url.match(/\/d\/(.*?)\//);
    if (match && match[1]) {
      return `https://drive.google.com/file/d/${match[1]}/preview`;
    }
  }
  return "https://docs.google.com/gview?url=" + url + "&embedded=true";
}
function handleSearch(isScan = false) {
  const keyword = input.value.trim().toLowerCase();

  if (!keyword) {
    document.getElementById("result").innerHTML = "";
    document.getElementById("status").innerHTML = "";
    return;
  }

  const found = data.find(item => item.code === keyword);

  if (found) {
    document.getElementById("status").innerHTML = "✅ Tìm thấy";

    document.getElementById("result").innerHTML = `
  <iframe 
    src="${convertDriveLink(found.url)}"
    width="100%" 
    height="600px">
  </iframe>
`;
  } else {
    document.getElementById("status").innerHTML = "❌ Không tìm thấy";
    document.getElementById("result").innerHTML = "";
  }

  // 🔥 tự bôi đen để scan tiếp
  if (isScan) {
    input.focus();
    input.select();
  }
}

// focus khi mở trang
window.onload = () => {
  input.focus();
};
</script>

</body>
</html>
