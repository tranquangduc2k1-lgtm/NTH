<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">

<title>Tìm mô tả sản phẩm NTH</title>

<meta http-equiv="Cache-Control" content="no-cache">

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

container.innerHTML = `
    <iframe
       src="${url}#zoom=page-width"
        width="90%"
        height="calc(100vh - 150px)"
        style="
            border:none;
            background:white;
            border-radius:10px;
        ">
    </iframe>
`;

h2{
    text-align:center;
}

input{
    width:25%;
    height:50px;

    padding:0 25px;

    font-size:30px;
    font-weight:bold;
    letter-spacing:2px;

    border:3px solid #28a745;
    border-radius:15px;

    background:#fff;

    outline:none;

    box-sizing:border-box;
}
    input::placeholder{

    color:#999;

    font-weight:normal;

}

#status{
    margin-top:10px;
    font-weight:bold;
}

/* TOOLBAR */
.toolbar{
    margin-top:10px;
    display:flex;
    gap:10px;
}

button{
    padding:8px 14px;
    cursor:pointer;
    border:none;
    background:#007bff;
    color:white;
    border-radius:5px;
}

button:hover{
    opacity:0.9;
}

/* PDF */
#pdf-container{
    margin-top:15px;
}

canvas{
    width:100%;
    margin-bottom:10px;
    border:1px solid #ccc;
    background:white;
}

.loading{
    color:#666;
    margin-top:10px;
}

</style>

</head>

<body>

<h2>🔎 Tìm mô tả sản phẩm</h2>

<input 
    type="text" 
    id="searchBox" 
    placeholder="Quét hoặc nhập mã..."
>

<div id="status"></div>
</div>

<div id="pdf-container"></div>
<script>

let data = [];

let dataLoaded = false;

let pdfDoc = null;

let scale = 1.2;


// LOAD JSON
async function loadData(){

    try{

        document.getElementById("status").innerHTML =
            "⏳ Đang tải dữ liệu...";

        const res = await fetch(
            "data.json?v=" + Date.now()
        );

        const json = await res.json();

        data = json.map(item => ({
            code: String(item.code)
                .trim()
                .toLowerCase(),

            url: String(item.url)
                .trim()
        }));

        dataLoaded = true;

        document.getElementById("status").innerHTML =
            "✅ Đã tải dữ liệu";

        console.log("DATA LOADED:", data);

    }
    catch(err){

        document.getElementById("status").innerHTML =
            "❌ Lỗi tải data.json";

        console.error(err);

    }

}


// CONVERT GOOGLE DRIVE LINK
function convertDriveLink(url){

    // GOOGLE DRIVE
    if(url.includes("drive.google.com")){

        const match = url.match(/\/d\/(.*?)\//);

        if(match && match[1]){

            const fileId = match[1];

            return `https://drive.google.com/file/d/${fileId}/preview`;

        }

    }

    return url;

}


// INPUT
const input = document.getElementById("searchBox");


// SCAN / ENTER
input.addEventListener("keydown", function(e){

    if(e.key === "Enter"){

        e.preventDefault();

        handleSearch(true);

    }

});


// SEARCH
function handleSearch(isScan=false){

    if(!dataLoaded){

        document.getElementById("status").innerHTML =
            "⏳ Dữ liệu chưa load xong";

        return;

    }

    const keyword = String(input.value)
        .trim()
        .toLowerCase();

    console.log("KEYWORD:", keyword);

    if(!keyword){

        return;

    }

    const found = data.find(item => item.code === keyword);

    console.log("FOUND:", found);

    if(found){

        document.getElementById("status").innerHTML =
            "✅ Tìm thấy";

        loadPDF(
            convertDriveLink(found.url)
        );

    }
    else{

        document.getElementById("status").innerHTML =
            "❌ Không tìm thấy";

        document.getElementById("pdf-container").innerHTML = "";
    }

    // AUTO SELECT
    if(isScan){

        input.focus();

        input.select();

    }

}


function loadPDF(url){

    const container =
        document.getElementById("pdf-container");

   // ===== IFRAME PDF =====
    container.style.display = "flex";
container.style.justifyContent = "center";

container.innerHTML = `
    <iframe
         src="${url}#view=FitV""
        width="98%"
        height="780px"
        style="
            border:none;
            background:white;
        ">
    </iframe>
`;

}
// RENDER PDF
async function renderPages(){

    const container =
        document.getElementById("pdf-container");

    container.innerHTML = "";

    for(
        let pageNum = 1;
        pageNum <= pdfDoc.numPages;
        pageNum++
    ){

        const page =
            await pdfDoc.getPage(pageNum);

        const viewport =
            page.getViewport({ scale });

        const canvas =
            document.createElement("canvas");

        const ctx =
            canvas.getContext("2d");

        canvas.height = viewport.height;

        canvas.width = viewport.width;

        container.appendChild(canvas);

        await page.render({

            canvasContext: ctx,

            viewport: viewport

        }).promise;

    }

}


// ZOOM
function zoomIn(){

    scale += 0.2;

    if(pdfDoc){

        renderPages();

    }

}

function zoomOut(){

    scale -= 0.2;

    if(scale < 0.6){

        scale = 0.6;

    }

    if(pdfDoc){

        renderPages();

    }

}


// START
window.onload = () => {

    input.focus();

    loadData();

};

</script>

</body>
</html>
