<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tìm mã PDF</title>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

body{
    font-family:Arial;
    max-width:1000px;
    margin:auto;
    background:#f5f5f5;
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:14px;
    font-size:18px;
    margin-top:10px;
}

#status{
    margin-top:10px;
    font-weight:bold;
}

/* TOOLBAR */
.toolbar{
    margin-top:10px;
    display:flex;
    gap:10px;
}

button{
    padding:8px 14px;
    cursor:pointer;
}

/* PDF */
#pdf-container{
    margin-top:15px;
}

canvas{
    width:100%;
    margin-bottom:10px;
    border:1px solid #ccc;
    background:white;
}

</style>
</head>

<body>

<h2>🔎 Tìm mã sản phẩm</h2>

<input type="text" id="searchBox" placeholder="Quét hoặc nhập mã...">

<div id="status"></div>

<div class="toolbar">

    <button onclick="zoomOut()">➖ Zoom Out</button>

    <button onclick="zoomIn()">➕ Zoom In</button>

</div>

<div id="pdf-container"></div>

<script>

let data = [];

let pdfDoc = null;

let scale = 1.2;


// LOAD JSON
fetch("data.json")
.then(res => res.json())
.then(json => {

data = json.map(item => ({
    code: String(item.code).trim().toLowerCase(),
    url: String(item.url).trim()
}));

    console.log("DATA LOADED:", data);

});


// INPUT
const input = document.getElementById("searchBox");


// SCAN
input.addEventListener("keydown", function(e){

    if(e.key === "Enter"){

        e.preventDefault();

        handleSearch(true);

    }

});


// SEARCH
function handleSearch(isScan=false){

    const keyword = input.value.trim().toLowerCase();

    if(!keyword){

        return;

    }

    const found = data.find(item => item.code === keyword);

    if(found){

        document.getElementById("status").innerHTML = "✅ Tìm thấy";

        loadPDF(found.url);

    }
    else{

        document.getElementById("status").innerHTML = "❌ Không tìm thấy";

        document.getElementById("pdf-container").innerHTML = "";

    }

    // AUTO SELECT
    if(isScan){

        input.focus();

        input.select();

    }

}


// LOAD PDF
async function loadPDF(url){

    const container = document.getElementById("pdf-container");

    container.innerHTML = "⏳ Đang tải PDF...";

    try{

        pdfDoc = await pdfjsLib.getDocument(url).promise;

        renderPages();

    }
    catch(err){

        container.innerHTML = "❌ Không mở được PDF";

        console.error(err);

    }

}


// RENDER
async function renderPages(){

    const container = document.getElementById("pdf-container");

    container.innerHTML = "";

    for(let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++){

        const page = await pdfDoc.getPage(pageNum);

        const viewport = page.getViewport({ scale });

        const canvas = document.createElement("canvas");

        const ctx = canvas.getContext("2d");

        canvas.height = viewport.height;

        canvas.width = viewport.width;

        container.appendChild(canvas);

        await page.render({

            canvasContext: ctx,

            viewport: viewport

        }).promise;

    }

}


// ZOOM
function zoomIn(){

    scale += 0.2;

    if(pdfDoc){

        renderPages();

    }

}

function zoomOut(){

    scale -= 0.2;

    if(scale < 0.6){

        scale = 0.6;

    }

    if(pdfDoc){

        renderPages();

    }

}


// FOCUS
window.onload = () => {

    input.focus();

};

</script>

</body>
</html>
